<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MeshCore NL Discovered Channels</title><style>body{font-family:Arial,sans-serif;margin:20px;background:#0f172a;color:#e2e8f0}table{width:100%;border-collapse:collapse;margin-top:20px}th,td{border:1px solid #334155;padding:8px;text-align:left}th{background:#1e293b}input{padding:10px;width:320px;border-radius:8px;border:1px solid #475569;background:#111827;color:#fff}.badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#1d4ed8;color:#fff;font-size:12px;margin-right:4px}</style></head><body><h1>MeshCore NL Discovered Channels</h1><p>Enriched channel metadata with optional scopes for city/province channels.</p><input id="search" placeholder="Filter channels, region, tags..."><table id="channels-table"><thead><tr><th>Channel</th><th>Scopes</th><th>Category</th><th>Subcategory</th><th>Region</th><th>Tags</th></tr></thead><tbody></tbody></table><script>let DATA=[];const tbody=document.querySelector('#channels-table tbody');function render(items){tbody.innerHTML='';items.forEach(ch=>{const row=document.createElement('tr');row.innerHTML=`<td>${ch.channel}</td><td>${(ch.scopes||[]).join(', ')}</td><td>${ch.category}</td><td>${ch.subcategory}</td><td>${ch.region||''}</td><td>${(ch.tags||[]).map(t=>`<span class="badge">${t}</span>`).join('')}</td>`;tbody.appendChild(row);});}fetch('metadata/channels.json').then(r=>r.json()).then(data=>{DATA=data;render(DATA);document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.toLowerCase();render(DATA.filter(ch=>[ch.channel,ch.region,(ch.tags||[]).join(' '),(ch.scopes||[]).join(' ')].join(' ').toLowerCase().includes(q)));});});</script></body></html>
